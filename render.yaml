services:
  - type: web
    name: thehundred-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: REPOSITORY_PROVIDER
        value: supabase
      - key: APP_BASE_URL
        value: https://www.thehundredalbion.com
      - key: DISCORD_REDIRECT_URI
        value: https://api.thehundredalbion.com/auth/discord/callback
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_SCOPES
        value: identify guilds
